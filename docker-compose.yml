name: sen-monitor

services:
  db:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: sen-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_SCRAPER_USER: ${POSTGRES_SCRAPER_USER}
      POSTGRES_SCRAPER_PASSWORD: ${POSTGRES_SCRAPER_PASSWORD}
      POSTGRES_GRAFANA_USER: ${POSTGRES_GRAFANA_USER}
      POSTGRES_GRAFANA_PASSWORD: ${POSTGRES_GRAFANA_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: sen-scraper
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_SCRAPER_USER}
      DB_PASSWORD: ${POSTGRES_SCRAPER_PASSWORD}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL_SECONDS}
      SCRAPER_USER_AGENT: ${SCRAPER_USER_AGENT}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: sen-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GF_SECRET_KEY}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: "https://${PUBLIC_DOMAIN}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "true"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SESSION_COOKIE_SECURE: "true"
      GF_SMTP_ENABLED: "false"
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_GRAFANA_USER: ${POSTGRES_GRAFANA_USER}
      POSTGRES_GRAFANA_PASSWORD: ${POSTGRES_GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    container_name: sen-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      grafana:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  db_data:
    driver: local
  grafana_data:
    driver: local
