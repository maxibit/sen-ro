apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    url: ${POSTGRES_HOST}:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_GRAFANA_USER}
    secureJsonData:
      password: ${POSTGRES_GRAFANA_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    editable: false
    isDefault: true
