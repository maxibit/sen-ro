apiVersion: 1

groups:
  - orgId: 1
    name: SEN Grid Alerts
    folder: Transelectrica SEN
    interval: 1m
    rules:
      - uid: sen-high-net-import
        title: High Net Import
        condition: C
        data:
          - refId: A
            datasourceUid: timescaledb
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: postgres
                uid: timescaledb
              editorMode: code
              format: table
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: "SELECT collected_at AS time, sold AS net_import_mw FROM sen_readings WHERE collected_at > NOW() - INTERVAL '10 minutes' ORDER BY collected_at DESC LIMIT 1"
              refId: A
              sql:
                columns:
                  - parameters: []
                    type: function
                groupBy:
                  - property:
                      type: string
                    type: groupBy
                limit: 50
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 2200
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "High net import: above 2200 MW"
          description: 'Romania has been importing more than 2200 MW for at least 5 minutes. Current net import: {{ printf "%.0f" $values.B.Value }} MW. Positive SOLD means import.'
        labels:
          severity: warning
          system: sen
          metric: net_import
        isPaused: false
